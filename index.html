<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Leadership Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>F1 Leadership Board</h1>
    </header>

    <main>
        <div class="podium">
            <div class="pod-card pod-2" id="podium-2">
                <div class="driver-name"></div>
                <div class="team-name"></div>
                <div class="pod-number">2</div>
            </div>
            <div class="pod-card pod-1" id="podium-1">
                <div class="driver-name"></div>
                <div class="team-name"></div>
                <div class="pod-number">1</div>
            </div>
            <div class="pod-card pod-3" id="podium-3">
                <div class="driver-name"></div>
                <div class="team-name"></div>
                <div class="pod-number">3</div>
            </div>
        </div>

        <table id="leaderboard">
            <thead>
                <tr><th>Pos</th><th>Driver</th><th>Team</th><th>Wins</th><th>Points</th></tr>
            </thead>
            <tbody id="leaderboard-body">
            </tbody>
        </table>

        <h2 class="teams-title">Constructor Teams </h2>
        <div id="teams-grid"></div>
    </main>
    <script src="APP.js"></script>
</body>
</html>
